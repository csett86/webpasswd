name: tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install PAM headers
        run: sudo apt update && sudo apt install -y libpam0g-dev

      - run: go test -count=1 ./...


  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: sudo apt update && sudo apt install -y libpam0g-dev
      - run: go build -o webpasswd .
        env:
          CGO_CFLAGS: -D_GNU_SOURCE
      - uses: actions/upload-artifact@v7
        with:
          name: webpasswd-${{ matrix.os }}
          path: webpasswd
      
      
